name: Despliegue Manual y Verificación

on:
  workflow_dispatch:

jobs:
  check-system:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: checkout@v4

      - name: Levantar Odoo con Docker
        run: |
          docker compose up -d
          echo "Esperando a que Odoo y Postgres despierten..."
          sleep 20

      - name: Obtener IP para el Túnel
        run: |
          echo "---------------------------------------------------"
          echo "TU CONTRASEÑA (IP) PARA LOCALTUNNEL ES:"
          curl ifconfig.me
          echo -e "\n---------------------------------------------------"

      - name: Crear Túnel y Mantener Vivo
        run: |
          # Instalamos localtunnel de forma rápida
          npm install -g localtunnel
          
          echo "---------------------------------------------------"
          echo "ABRE ESTA URL EN TU CELULAR:"
          echo "https://shadowroot-odoo.loca.lt"
          echo "---------------------------------------------------"
          
          # Lanzamos el túnel. El subdomain es fijo para que siempre sea la misma URL
          lt --port 8069 --subdomain shadowroot-odoo & 
          
          # Tiempo reducido a 10 minutos (600 segundos)
          echo "El servidor estará activo por 10 minutos. Aprovecha el tiempo."
          sleep 600

